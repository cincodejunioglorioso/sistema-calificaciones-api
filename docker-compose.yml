services:
  # ================================
  # PostgreSQL Database
  # ================================
  db:
    image: postgres:16-alpine
    container_name: sistema_calificaciones_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-092218}
      POSTGRES_DB: ${DB_NAME:-sistema_calificaciones}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-sistema_calificaciones}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ================================
  # NestJS Backend API
  # ================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: sistema_calificaciones_api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-092218}
      DB_NAME: ${DB_NAME:-sistema_calificaciones}
      JWT_SECRET: ${JWT_SECRET:-MY_SECRET_KEY}
      PORT: 5000
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - ./src:/app/src:ro
      - ./public:/app/public:ro
      - ./typeorm.config.ts:/app/typeorm.config.ts:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
